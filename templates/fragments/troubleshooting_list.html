{{if not .}}
<div class="text-muted small">No emails processed yet. Run a scan to populate troubleshooting data.</div>
{{else}}
{{range .}}
<div class="card p-3 mb-3">
  <div class="d-flex align-items-start justify-content-between mb-2">
    <div>
      <div class="fw-semibold">{{.Subject}}</div>
      <div class="small text-muted">{{.Sender}} &bull; {{.AccountEmail}}</div>
    </div>
    <div class="small text-muted text-nowrap ms-3">{{.Timestamp}}</div>
  </div>

  <details class="mb-2">
    <summary class="small fw-semibold text-muted" style="cursor:pointer">Gmail data</summary>
    <pre class="font-monospace small mb-0 mt-2 p-2 rounded" style="background:var(--bs-body-bg);white-space:pre-wrap;max-height:300px;overflow:auto;border:1px solid var(--bs-border-color)">{{.GmailRaw}}</pre>
  </details>

  <details class="mb-2">
    <summary class="small fw-semibold text-muted" style="cursor:pointer">Request sent to LLM</summary>
    <pre class="font-monospace small mb-0 mt-2 p-2 rounded" style="background:var(--bs-body-bg);white-space:pre-wrap;max-height:400px;overflow:auto;border:1px solid var(--bs-border-color)">{{.LlmRequest}}</pre>
  </details>

  <details>
    <summary class="small fw-semibold text-muted" style="cursor:pointer">LLM response</summary>
    <pre class="font-monospace small mb-0 mt-2 p-2 rounded" style="background:var(--bs-body-bg);white-space:pre-wrap;max-height:300px;overflow:auto;border:1px solid var(--bs-border-color)">{{.LlmResponse}}</pre>
  </details>
</div>
{{end}}
{{end}}
