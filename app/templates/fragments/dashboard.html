<div class="stats mb-4" data-poller-running="{{ poller_running|tojson }}">
  <div class="stat stat-accent-primary">
    <div class="stat-title">Accounts</div>
    <div class="stat-value text-primary font-monospace">{{ accounts|length }}</div>
    <div class="stat-desc">Connected</div>
  </div>
  <div class="stat stat-accent-success">
    <div class="stat-title">Active Prompts</div>
    <div class="stat-value text-success font-monospace">{{ active_prompts }}</div>
    <div class="stat-desc">Rules running</div>
  </div>
  <div class="stat stat-accent-neutral">
    <div class="stat-title">Poll Interval</div>
    <div class="stat-value font-monospace">{{ poll_interval }}</div>
    <div class="stat-desc">Between scans</div>
  </div>
  <div class="stat stat-accent-success">
    <div class="stat-title">Next Scan</div>
    <div class="stat-value text-success font-monospace">{{ next_scan }}</div>
    <div class="stat-desc">Scheduled</div>
  </div>
</div>
<h6 class="section-title">Recent Activity</h6>
{% include 'fragments/logs_list.html' %}
