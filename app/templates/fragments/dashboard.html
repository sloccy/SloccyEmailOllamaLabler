<div class="stats stats-horizontal shadow w-full u-mb-4">
  <div class="stat stat-accent-primary">
    <div class="stat-title">Accounts</div>
    <div class="stat-value text-primary font-mono">{{ accounts|length }}</div>
    <div class="stat-desc">Connected</div>
  </div>
  <div class="stat stat-accent-success">
    <div class="stat-title">Active Prompts</div>
    <div class="stat-value text-success font-mono">{{ active_prompts }}</div>
    <div class="stat-desc">Rules running</div>
  </div>
  <div class="stat stat-accent-neutral">
    <div class="stat-title">Poll Interval</div>
    <div class="stat-value font-mono">{{ poll_interval }}</div>
    <div class="stat-desc">Between scans</div>
  </div>
  <div class="stat stat-accent-success">
    <div class="stat-title">Next Scan</div>
    <div class="stat-value text-success font-mono">{{ next_scan }}</div>
    <div class="stat-desc">Scheduled</div>
  </div>
</div>
<script>
  (function(){
    var dot = document.getElementById('pollerDot');
    var lbl = document.getElementById('pollerLabel');
    {% if poller_running %}
    dot.classList.add('active'); lbl.textContent = 'running';
    {% else %}
    dot.classList.remove('active'); lbl.textContent = 'stopped';
    {% endif %}
  })();
</script>
<h6 class="section-title">Recent Activity</h6>
