<div class="oauth-step-body">
  <div class="oauth-step-label">Open the link and approve access</div>
  <div class="oauth-step-desc">Open the link below in your browser. After approving, your browser will try to open a page that fails to load — that is expected.</div>
  <div class="url-box visible" data-url="{{ auth_url|e }}">{{ auth_url|e }}</div>
  <button class="btn btn-ghost btn-sm" onclick="copyAuthUrl(this)">Copy Link</button>
</div>
