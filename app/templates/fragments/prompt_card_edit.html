{% from "macros.html" import action_checkboxes %}
<div class="card mb-3" id="prompt-card-{{ p.id }}" data-id="{{ p.id }}">
  <div class="card-body">
    <div class="d-flex align-items-start gap-3">
      <div class="drag-handle text-muted">&#9776;</div>
      <div class="flex-grow-1">
        <form hx-put="/fragments/prompts/{{ p.id }}"
              hx-target="#prompts-list"
              hx-swap="innerHTML">
          <input type="hidden" name="active" value="{{ p.active }}">
          <div class="form-grid-2">
            <div>
              <label class="form-label">Rule name</label>
              <input type="text" class="form-control form-control-sm" name="name" value="{{ p.name|e }}">
            </div>
            <div>
              <label class="form-label">Gmail label</label>
              <input type="text" class="form-control form-control-sm" name="label_name" value="{{ p.label_name|e }}">
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Apply to account</label>
            <select name="account_id" class="form-select form-select-sm">
              <option value="">All accounts (global)</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if p.account_id == a.id %}selected{% endif %}>{{ a.email|e }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Instructions</label>
            <textarea class="form-control form-control-sm textarea-tall" name="instructions">{{ p.instructions|e }}</textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Actions when matched</label>
            {{ action_checkboxes('ea-' ~ p.id, p) }}
          </div>
          <div class="d-flex align-items-center gap-2 border-top pt-3 mb-3">
            <input type="checkbox" class="form-check-input mt-0" name="stop_processing" value="1" id="ea-stop-{{ p.id }}" {% if p.stop_processing %}checked{% endif %}>
            <label class="mb-0" for="ea-stop-{{ p.id }}">Stop processing further rules if this one matches</label>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary btn-sm">Save</button>
            <button type="button" class="btn btn-outline-secondary btn-sm"
              hx-get="/fragments/prompts/{{ p.id }}/view"
              hx-target="#prompt-card-{{ p.id }}"
              hx-swap="outerHTML">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
