{% set account_map = {} %}
{% for a in accounts %}{% set _ = account_map.update({a.id: a.email}) %}{% endfor %}
<div class="card u-mb-3" id="prompt-card-{{ p.id }}" data-id="{{ p.id }}"
     ondragover="onDragOver(event)"
     ondragleave="onDragLeave(event)"
     ondrop="onDrop(event)">
  <div class="card-body">
    <div class="u-flex u-items-start u-gap-3">
      <div class="drag-handle u-text-muted">&#9776;</div>
      <div class="u-flex-grow">
        <form hx-put="/fragments/prompts/{{ p.id }}"
              hx-target="#prompts-list"
              hx-swap="innerHTML">
          <input type="hidden" name="active" value="{{ p.active }}">
          <div class="u-grid u-grid-2 u-gap-3 u-mb-3">
            <div>
              <label class="form-label">Rule name</label>
              <input type="text" class="input input-sm" name="name" value="{{ p.name|e }}">
            </div>
            <div>
              <label class="form-label">Gmail label</label>
              <input type="text" class="input input-sm" name="label_name" value="{{ p.label_name|e }}">
            </div>
          </div>
          <div class="u-mb-3">
            <label class="form-label">Apply to account</label>
            <select class="select select-sm" name="account_id">
              <option value="">All accounts (global)</option>
              {% for a in accounts %}
              <option value="{{ a.id }}" {% if p.account_id == a.id %}selected{% endif %}>{{ a.email|e }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="u-mb-3">
            <label class="form-label">Instructions</label>
            <textarea class="textarea textarea-sm" name="instructions">{{ p.instructions|e }}</textarea>
          </div>
          <div class="u-mb-3">
            <label class="form-label">Actions when matched</label>
            <div class="u-flex u-flex-wrap u-gap-2 u-mt-1">
              <div class="u-flex u-items-center u-gap-2 bg-base-300 border u-border-subtle rounded-lg u-px-3 u-py-2"><input type="checkbox" class="checkbox" name="action_archive" value="1" id="ea-archive-{{ p.id }}" {% if p.action_archive %}checked{% endif %}><label class="u-mb-0" for="ea-archive-{{ p.id }}">Archive</label></div>
              <div class="u-flex u-items-center u-gap-2 bg-base-300 border u-border-subtle rounded-lg u-px-3 u-py-2"><input type="checkbox" class="checkbox" name="action_spam" value="1" id="ea-spam-{{ p.id }}" {% if p.action_spam %}checked{% endif %}><label class="u-mb-0" for="ea-spam-{{ p.id }}">Send to Spam</label></div>
              <div class="u-flex u-items-center u-gap-2 bg-base-300 border u-border-subtle rounded-lg u-px-3 u-py-2"><input type="checkbox" class="checkbox" name="action_trash" value="1" id="ea-trash-{{ p.id }}" {% if p.action_trash %}checked{% endif %}><label class="u-mb-0" for="ea-trash-{{ p.id }}">Trash</label></div>
              <div class="u-flex u-items-center u-gap-2 bg-base-300 border u-border-subtle rounded-lg u-px-3 u-py-2"><input type="checkbox" class="checkbox" name="action_mark_read" value="1" id="ea-read-{{ p.id }}" {% if p.action_mark_read %}checked{% endif %}><label class="u-mb-0" for="ea-read-{{ p.id }}">Mark as Read</label></div>
            </div>
          </div>
          <div class="u-flex u-items-center u-gap-2 border-t u-pt-3 u-mb-3">
            <input type="checkbox" class="checkbox" name="stop_processing" value="1" id="ea-stop-{{ p.id }}" {% if p.stop_processing %}checked{% endif %}>
            <label class="u-mb-0" for="ea-stop-{{ p.id }}">Stop processing further rules if this one matches</label>
          </div>
          <div class="u-flex u-gap-2">
            <button type="submit" class="btn btn-primary btn-sm">Save</button>
            <button type="button" class="btn btn-outline btn-secondary btn-sm"
              hx-get="/fragments/prompts/{{ p.id }}/view"
              hx-target="#prompt-card-{{ p.id }}"
              hx-swap="outerHTML">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
